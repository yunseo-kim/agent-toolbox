# Codecov configuration
# Docs: https://docs.codecov.com/docs/codecov-yaml
# Validate: curl --data-binary @codecov.yml https://codecov.io/validate

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "80...100"

  status:
    # Project status: measures overall project coverage against the base commit.
    # Fails the PR check if coverage drops below the threshold.
    project:
      default:
        target: auto # compare against base commit coverage
        threshold: 10% # allow up to 10% drop before failing
        if_ci_failed: error
        only_pulls: false

    # Patch status: measures coverage of lines changed in the PR only.
    # Ensures new/modified code is adequately tested.
    patch:
      default:
        target: 80%
        threshold: 10%

# PR comment configuration
comment:
  layout: "condensed_header, diff, flags, components, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

# Paths to exclude from coverage measurement
ignore:
  - "dist/**"
  - "tests/**"
  - "scripts/**"
  - "catalog/**"
  - "templates/**"
  - ".agents/**"
  - ".agent/**"
  - ".claude/**"
  - ".cursor/**"
  - ".windsurf/**"
  - ".github/**"
