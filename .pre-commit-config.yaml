# Pre-commit hooks for awesome-agent-toolbox
# Install: pip install pre-commit && pre-commit install
#
# Required environment variables for full analysis:
#   SKILL_SCANNER_LLM_API_KEY  - OpenAI API key (LLM + Meta analyzers)
#   SKILL_SCANNER_LLM_MODEL    - LLM model name (default: gpt-4o)
#   VIRUSTOTAL_API_KEY         - VirusTotal API key (binary scanning)
#   AI_DEFENSE_API_KEY         - (disabled) Cisco AI Defense API key

repos:
  - repo: https://github.com/cisco-ai-defense/skill-scanner
    rev: 2.0.0
    hooks:
      - id: skill-scanner
        args:
          - --policy
          - strict
          - --use-behavioral
          - --use-llm
          - --llm-provider
          - openai
          - --use-trigger
          - --use-virustotal
          - --enable-meta
          - --fail-on-severity
          - high
          - --lenient
