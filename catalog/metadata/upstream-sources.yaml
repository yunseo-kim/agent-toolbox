# Upstream repository sources for catalog skill sync and discovery.
# Used by the upstream-sync GitHub Action for:
#   1. Syncing body content updates to ported skills
#   2. Detecting new skills added to upstream repos
#
# Schema:
#   sources.<repo>:
#     ref:       Default branch to track
#     discover:
#       root:       Directory prefix where skills live
#       skill_file: Filename to look for (always SKILL.md)
#     skills:     Map of catalog_name -> { upstream_dir }
#     ignored:    Upstream skill dirs we chose NOT to port (excluded from new-skill alerts)
#
# Only repos with ported skills are tracked here. Repos with only adapted/synthesized
# skills are excluded -- those skills have significant local modifications and don't
# benefit from automated body sync or skill discovery.
#
# Naming: when upstream_dir differs from catalog_name, the skill was renamed during porting.

sources:
  anthropics/skills:
    ref: main
    discover:
      root: skills/
      skill_file: SKILL.md
    skills:
      algorithmic-art:      { upstream_dir: algorithmic-art }
      canvas-design:        { upstream_dir: canvas-design }
      doc-coauthoring:      { upstream_dir: doc-coauthoring }
      frontend-design:      { upstream_dir: frontend-design }
      internal-comms:       { upstream_dir: internal-comms }
      mcp-builder:          { upstream_dir: mcp-builder }
      skill-creator:        { upstream_dir: skill-creator }
      slack-gif-creator:    { upstream_dir: slack-gif-creator }
      theme-factory:        { upstream_dir: theme-factory }
      web-artifacts-builder: { upstream_dir: web-artifacts-builder }
      webapp-testing:       { upstream_dir: webapp-testing }
    ignored:
      - docx    # Proprietary license
      - pdf     # Proprietary license
      - pptx    # Proprietary license
      - xlsx    # Proprietary license
      - brand-guidelines

  Shubhamsaboo/awesome-llm-apps:
