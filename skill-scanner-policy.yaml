# Skill Scanner – awesome-agent-toolbox Custom Scan Policy
# ====================================
# Custom security scanner policy for awesome-agent-toolbox.
#
# Usage:
#   skill-scanner scan --policy skill-scanner-policy.yaml ./my-skill

policy_name: awesome-agent-toolbox
policy_version: "1.0"
preset_base: strict

# ---------------------------------------------------------------------------
# Hidden files – which dotfiles and dotdirs are considered benign
# ---------------------------------------------------------------------------
# Files / dirs not in these lists will be flagged.  Customise per-org to
# match your toolchain (e.g. add ".bazelrc" if you use Bazel).
hidden_files:
  benign_dotfiles:
    # Version control
    - ".gitignore"
    - ".gitattributes"
    - ".gitmodules"
    - ".gitkeep"
    # Editor / formatting
    - ".editorconfig"
    - ".prettierrc"
    - ".prettierignore"
    # Linting – JavaScript / TypeScript
    - ".eslintrc"
    - ".eslintignore"
    - ".eslintrc.json"
    - ".eslintrc.js"
    - ".eslintrc.yml"
    - ".stylelintrc"
    - ".stylelintignore"
    # Node.js
    - ".npmrc"
    - ".npmignore"
    - ".nvmrc"
    - ".node-version"
    # Language version managers
    - ".python-version"
    - ".ruby-version"
    - ".tool-versions"
    # Python linting
    - ".flake8"
    - ".pylintrc"
    - ".isort.cfg"
    - ".mypy.ini"
    # Frontend tooling
    - ".babelrc"
    - ".browserslistrc"
    - ".postcssrc"
    # Docker / env
    - ".dockerignore"
    - ".env.example"
    - ".env.sample"
    - ".env.template"
    # Markdown / YAML linting
    - ".markdownlint.json"
    - ".markdownlintignore"
    - ".yamllint"
    - ".yamllint.yml"
    # Cursor / AI
    - ".cursorrules"
    - ".cursorignore"
    # C/C++
    - ".clang-format"
    - ".clang-tidy"
    # Other
    - ".rubocop.yml"
    - ".solhint.json"
    - ".mcp.json"
    - ".envrc"
    - ".version"
    - ".goreleaser.yaml"
    - ".goreleaser.yml"
  
  benign_dotdirs:
    # CI / IDE
    - ".github"
    - ".vscode"
    - ".idea"
    - ".cursor"
    - ".husky"
    - ".circleci"
    - ".gitlab"
    # Data stores / caches
    - ".lance"
    - ".lmdb"
    - ".cache"
    - ".tmp"
    - ".data"
    - ".next"
    - ".nuxt"
    - ".parcel-cache"
    # Plugin / skill hosting
    - ".claude"
    - ".claude-plugin"
    - ".codex"
    # Index / search data
    - ".osgrep"
    - ".obsidian"
    - ".leann"
    # Container / dev config
    - ".devcontainer"
    - ".smithery"
    # Static site generators / build tools
    - ".vitepress"
    - ".docusaurus"
    - ".storybook"

# ---------------------------------------------------------------------------
# Pipeline taint analysis
# ---------------------------------------------------------------------------
pipeline:
  # Installer domains whose curl|sh patterns are demoted to LOW severity
  known_installer_domains:
    - "sh.rustup.rs"               # Rust
    - "astral.sh"                  # uv / ruff
    - "raw.githubusercontent.com/nvm-sh"  # nvm
    - "get.sdkman.io"              # SDKMAN
    - "pyenv.run"                  # pyenv
    - "get.docker.com"             # Docker
    - "install.python-poetry.org"  # Poetry
    - "bun.sh"                     # Bun
    - "deno.land"                  # Deno
    - "get.volta.sh"               # Volta
    - "brew.sh"                    # Homebrew
    - "getcomposer.org"            # Composer
    - "nixos.org"                  # Nix
    - "get.pnpm.io"               # pnpm
    - "proto.moonrepo.app"         # proto
    - "mise.jdx.dev"               # mise
    - "taskfile.dev"               # Task

  # Regex patterns for benign pipe targets (full pipeline is matched)
  benign_pipe_targets:
    - 'ps\s.*\|\s*grep'                                                  # ps aux | grep
    - 'grep\s.*\|\s*grep\s+-v'                                           # grep | grep -v
    - 'cat\s.*\|\s*(sort|uniq|wc|head|tail|grep|cut|awk|sed)'            # cat | text-processing
    - 'find\s.*\|\s*(sort|head|wc|xargs\s+ls)'                           # find | sort/count
    - 'ls\s.*\|\s*(sort|head|grep|wc)'                                   # ls | filter
    - 'echo\s.*\|\s*(tr|sed|awk|cut|base64)'                             # echo | transform
    - 'curl\s.*\|\s*(jq|python\s+-m\s+json\.tool|json_pp|yq|xmllint)'    # curl | formatter
    # Additional trusted patterns for awesome-agent-toolbox
    - 'curl\s+-s\s+"https://api\.trello\.com/[^"|]+"\s*\|\s*jq(\s|$)'    # Trello API

  # Path segments that indicate documentation context (lower severity)
  doc_path_indicators:
    - "doc"
    - "references"
    - "docs"
    - "examples"
    - "tutorials"
    - "guides"

  # Demote pipeline findings found in documentation paths
  demote_in_docs: true
  # Demote findings that look like instructional examples (e.g. SKILL.md)
  demote_instructional: true
  # Check URLs against known_installer_domains and demote matches to LOW
  check_known_installers: true
  # De-duplicate equivalent pipelines extracted via multiple regex paths
  dedupe_equivalent_pipelines: true

  # COMPOUND_FETCH_EXECUTE heuristics – inherited from the strict preset

  # Wrapper commands allowed before execution sinks (e.g. sudo bash script.sh)
  compound_fetch_exec_prefixes:
    - "sudo"
    - "env"
    - "command"
    - "time"
    - "nohup"
    - "nice"
  # Execution sink commands for fetch+execute detection
  compound_fetch_exec_commands:
    - "bash"
    - "sh"
    - "zsh"
    - "source"
    - "python"
    - "python3"
    - "perl"
    - "ruby"
    - "node"
    - "."
  # Hint words for data exfiltration detection in tool-chaining
  exfil_hints:
    - "send"
    - "upload"
    - "transmit"
    - "webhook"
    - "slack"
    - "exfil"
    - "forward"
  # Tokens that indicate API/framework docs (suppress tool-chaining FP)
  api_doc_tokens:
    - "@app."
    - "app."
    - "router."
    - "route"
    - "endpoint"

# ---------------------------------------------------------------------------
# Rule scoping – fire rules more broadly
# ---------------------------------------------------------------------------
rule_scoping:
  # Rules that ONLY fire on SKILL.md and script files (.py, .sh, etc.)
  # These detect patterns that are only dangerous as actual instructions
  skillmd_and_scripts_only:
    - "coercive_injection_generic"

  # Only skip YARA in explicit documentation directories
  skip_in_docs:
    - "code_execution_generic"
    - "system_manipulation_generic"
    - "script_injection_generic"
    # JS/TS rules – skip in documentation context even in strict mode
    - "COMMAND_INJECTION_JS_CHILD_PROCESS"
    - "COMMAND_INJECTION_JS_FUNCTION_CONSTRUCTOR"
    - "DATA_EXFIL_JS_NETWORK"
    - "DATA_EXFIL_JS_FS_ACCESS"

  # Unicode steganography fires on everything (awesome-agent-toolbox wants wide coverage)
  code_only:
    - "sql_injection_generic"

  # Directory names that mark "documentation" context for YARA scoping
  doc_path_indicators:
    - "references"
    - "docs"
    - "examples"
    - "tutorials"
    - "guides"
    - "rules"
    - "patterns"
    - "templates"
    - "test"

  # Filename patterns (regex) that mark educational/example content
  doc_filename_patterns:
    - 'security[_-]patterns|examples?|patterns?|samples?|demo|tutorial|guide|howto|cheatsheet'
    # Treat explicit template source files as instructional/non-runtime context.
    # This prevents false CRITICAL hits such as utilityFunction(...) -> Function( substring matches
    # in assets/*.template.ts(x) example files.
    - '\.template\.(?:ts|tsx|js|jsx)$'
  # De-duplicate reference aliases that resolve to the same file
  dedupe_reference_aliases: true
  # De-duplicate identical findings emitted by overlapping static scan passes
  dedupe_duplicate_findings: true
  # Skip ASSET_PROMPT_INJECTION in documentation/reference paths
  asset_prompt_injection_skip_in_docs: true

# ---------------------------------------------------------------------------
# Credential allow-list – well-known test values to suppress
# ---------------------------------------------------------------------------
credentials:
  known_test_values:
    # Stripe official test keys
    - "sk_test_4eC39HqLyjWDarjtT1zdp7dc"
    - "pk_test_TYooMQauvdEDq54NiTphI7jx"
    # JWT.io example token prefix
    - "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwiaWF0IjoxNTE2MjM5MDIyfQ"
    # Common placeholder passwords
    - 'password="password"'
    - "password='password'"
    - "api_key='sk-no-key-required'"
    - 'api_key="sk-no-key-required"'
  placeholder_markers:
    - "your-"
    - "your_"
    - "your "
    - "example"
    - "sample"
    - "dummy"
    - "placeholder"
    - "replace"
    - "changeme"
    - "change_me"
    - "<your"
    - "<insert"

# ---------------------------------------------------------------------------
# System cleanup – safe destructive cleanup targets
# ---------------------------------------------------------------------------
system_cleanup:
  safe_rm_targets:
    - "dist"
    - "build"
    - "tmp"
    - "temp"
    - ".tmp"
    - ".temp"
    - ".cache"

# ---------------------------------------------------------------------------
# File classification – inherited from default (no relaxation)
# ---------------------------------------------------------------------------
file_classification:
  # Still scan inert extensions (e.g. images) for embedded content
  skip_inert_extensions: false
  # Treat script shebangs (e.g. .js with #!/usr/bin/env node) as compatible
  allow_script_shebang_text_extensions: true
  # Script-like extensions where shebang headers are considered normal
  script_shebang_extensions:
    - ".py"
    - ".sh"
    - ".bash"
    - ".js"
    - ".ts"
    - ".rb"
    - ".pl"
    - ".php"

# ---------------------------------------------------------------------------
# File limits – numeric thresholds for inventory checks
# ---------------------------------------------------------------------------
file_limits:
  max_file_count: 100           # Files above this → EXCESSIVE_FILE_COUNT
  max_file_size_bytes: 5242880  # 5 MB – files above this → OVERSIZED_FILE
  max_reference_depth: 5        # Recursion depth for reference resolution
  max_name_length: 64           # Skill name length limit
  max_description_length: 1024  # Max description length
  min_description_length: 30    # Below this → vague description warning
  max_yara_scan_file_size_bytes: 104857600  # 100 MB — relaxed YARA scan limit
  max_loader_file_size_bytes: 20971520      # 20 MB — relaxed content loading limit

# ---------------------------------------------------------------------------
# Analysis thresholds – YARA and analyzability scoring
# ---------------------------------------------------------------------------
analysis_thresholds:
  zerowidth_threshold_with_decode: 20   # Flag steganography earlier
  zerowidth_threshold_alone: 100        # Lower bar for standalone zero-width
  analyzability_low_risk: 90            # Score >= this → LOW risk
  analyzability_medium_risk: 70         # Score >= this → MEDIUM risk
  min_dangerous_lines: 3                # Min confusable-char lines for HOMOGLYPH_ATTACK
  min_confidence_pct: 80                # Min confidence % for FILE_MAGIC_MISMATCH
  exception_handler_context_lines: 30   # Context lines around exception handlers
  short_match_max_chars: 2              # Max chars for "short match" in unicode steg
  cyrillic_cjk_min_chars: 5             # Min Cyrillic/CJK chars to suppress steg FP
  homoglyph_filter_math_context: true   # Suppress scientific math formula contexts
  homoglyph_math_aliases:
    - "COMMON"
    - "GREEK"
  max_regex_pattern_length: 500         # Stricter regex length limit (ReDoS protection)

# ---------------------------------------------------------------------------
# Sensitive files – expanded patterns
# ---------------------------------------------------------------------------
sensitive_files:
  patterns:
    - '/etc/(?:passwd|shadow|hosts|sudoers)'
    - '~?/\.(?:ssh|aws|gnupg|config|env|kube)'
    - '\.(?:env|pem|key|crt|p12|pfx|jks|keystore)'
    - '(?:credentials|secrets?|tokens?|password|private)'
    - '\$(?:HOME|USER|SSH_AUTH_SOCK|AWS_|KUBECONFIG)'

# ---------------------------------------------------------------------------
# Command safety – stricter: promote docker/kubectl/ssh to dangerous
# ---------------------------------------------------------------------------
command_safety:
  # Only override tiers you want to change; empty → use built-in defaults
  risky_commands:
    - "rm"
    - "dd"
    - "mkfs"
    - "mount"
    - "umount"
    - "fdisk"
    - "iptables"
    - "nft"
    - "ufw"
    - "systemctl"
    - "service"
    - "launchctl"
    - "crontab"
    - "at"
    - "nc"
    - "ncat"
    - "netcat"
    - "socat"
    - "telnet"
    - "nmap"

  dangerous_commands:
    - "curl"
    - "wget"
    - "eval"
    - "exec"
    - "source"
    - "bash"
    - "sh"
    - "zsh"
    - "dash"
    - "fish"
    - "csh"
    - "tcsh"
    - "ksh"
    - "sudo"
    - "su"
    - "doas"
    - "base64"
    - "openssl"
    - "gpg"
    # Promoted from risky in strict mode
    - "ssh"
    - "scp"
    - "rsync"
    - "sftp"
    - "docker"
    - "podman"
    - "kubectl"

  # Regex patterns that immediately classify a command as DANGEROUS.
  # Strict mode includes all default patterns plus additional ones.
  dangerous_arg_patterns:
    # Python/python3 inline code execution
    - '\bpython[23]?\s+.*-c\s'
    # Node inline JS execution
    - '\bnode\s+.*(?:-e|--eval)\s'
    # Ruby inline code execution
    - '\bruby\s+.*-e\s'
    # env spawning a shell
    - '\benv\s+.*(?:/bin/(?:ba)?sh|/bin/(?:z|da|fi)sh)'
    # find with -exec/-execdir
    - '\bfind\s+.*-exec(?:dir)?\s'
    # less/more/man with shell escape
    - '\b(?:less|more|man)\s+.*!\s*/bin/'
    # pip/pip3 install from untrusted index
    - '\bpip[3]?\s+install\s+(?:--index-url|--extra-index-url|-i)\s'
    # git clone/remote chained with shell operators
    - '\bgit\s+(?:clone|remote\s+add)\s+.*[;&|]'
    # Strict-only: pip install from any URL (supply-chain risk)
    - '\bpip[3]?\s+install\s+https?://'
    # Strict-only: npm run / npx arbitrary script execution
    - '\bnpm\s+(?:run|exec)\s'
    - '\bnpx\s+'

# ---------------------------------------------------------------------------
# Analyzers – all enabled in strict mode
# ---------------------------------------------------------------------------
analyzers:
  static: true
  bytecode: true
  pipeline: true

# ---------------------------------------------------------------------------
# LLM analysis – relaxed context budgets for LLM and meta analyzers
# ---------------------------------------------------------------------------
# Content that fits within budget is sent in full (no truncation).
# Content that exceeds the budget is skipped entirely and an INFO finding
# is emitted telling you which threshold to increase.
#
# The meta analyzer multiplies these limits by meta_budget_multiplier
# (default 3×) because it needs more context for cross-correlation.
llm_analysis:
  max_instruction_body_chars: 50000    # covers marketing-psychology (21k), rag-patterns (19k), js-docs-fact-check (17k)
  max_code_file_chars: 30000           # catalog max real code file: 15.5k (prompt-input-cursor.tsx); 1.93x headroom
  max_referenced_file_chars: 48000     # covers torch-export guide (27k), node_mcp_server.md (28k); 1.7x headroom
  max_total_prompt_chars: 400000       # gpt-5.2 (400k tokens ~1.6M chars); ~100k tokens = 25% of context window
  max_output_tokens: 8192              # Max tokens for LLM responses
  meta_budget_multiplier: 3.0          # Meta analyzer multiplier (3× above)

# ---------------------------------------------------------------------------
# Finding output – strict still dedupes duplicate issue records
# ---------------------------------------------------------------------------
finding_output:
  dedupe_exact_findings: true
  dedupe_same_issue_per_location: true
  # Earlier entries win when collapsing same issue at the same location.
  # Keep meta/LLM first so richer remediation/context is preserved.
  same_issue_preferred_analyzers:
    - "meta_analyzer"
    - "llm_analyzer"
    - "meta"
    - "llm"
    - "behavioral"
    - "pipeline"
    - "static"
    - "yara"
    - "analyzability"
  same_issue_collapse_within_analyzer: true
  annotate_same_path_rule_cooccurrence: true
  attach_policy_fingerprint: true

# ---------------------------------------------------------------------------
# Severity overrides – raise or lower any rule's severity
# ---------------------------------------------------------------------------
# Example:
#   severity_overrides:
#     - rule_id: BINARY_FILE_DETECTED
#       severity: MEDIUM            # Promote back to MEDIUM for strict orgs
#       reason: "Our policy treats unknown binaries as medium risk"
severity_overrides:
  # Strict mode overrides
  - rule_id: BINARY_FILE_DETECTED
    severity: MEDIUM
    reason: "Strict mode treats unknown binaries as medium risk"
  - rule_id: HIDDEN_DATA_FILE
    severity: MEDIUM
    reason: "Strict mode flags all unknown hidden files at medium"
  - rule_id: PYCACHE_FILES_DETECTED
    severity: MEDIUM
    reason: "Strict mode flags bytecode distribution at medium"
  # Additional overrides for awesome-agent-toolbox
  - rule_id: CROSS_SKILL_DATA_RELAY
    severity: MEDIUM
    reason: "In a curated catalog, cross-skill composability is expected; keep as review signal, not auto-fail HIGH."

disabled_rules: []
