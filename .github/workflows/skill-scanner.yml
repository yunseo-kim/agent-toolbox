name: Skill Security Scan

on:
  pull_request:
    paths:
      - "catalog/skills/**"
      - ".agents/skills/**"
  push:
    branches: [main]
    paths:
      - "catalog/skills/**"
      - ".agents/skills/**"
  schedule:
    # Monthly full scan on 1st at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      archive:
        description: "Archive scan reports as markdown to docs/security-reports/"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  scan:
    name: Skill Scanner
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: write
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history for PR/push incremental diff; shallow clone for full scans
          fetch-depth: ${{ (github.event_name == 'pull_request' || github.event_name == 'push') && '0' || 1 }}

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install skill-scanner
        run: pip install cisco-ai-skill-scanner

      - name: Prepare report directory
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.archive == true)
        run: mkdir -p docs/security-reports

      - name: Detect changed skills
        id: changes
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        run: |
          # Determine base SHA for diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Handle edge cases: invalid or missing base SHA
          if [ -z "$BASE_SHA" ] || \
             [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || \
             ! git cat-file -t "$BASE_SHA" >/dev/null 2>&1; then
            echo "::warning::Cannot determine base SHA — falling back to full scan"
            echo "catalog=all" >> "$GITHUB_OUTPUT"
            echo "dev=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect changed catalog skill directories
          CATALOG=$(git diff --name-only "$BASE_SHA"..HEAD -- catalog/skills/ 2>/dev/null | \
            sed -n 's|^catalog/skills/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ' | xargs)

          # Detect changed dev tooling skill directories
          DEV=$(git diff --name-only "$BASE_SHA"..HEAD -- .agents/skills/ 2>/dev/null | \
            sed -n 's|^\.agents/skills/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ' | xargs)

          echo "catalog=${CATALOG:-none}" >> "$GITHUB_OUTPUT"
          echo "dev=${DEV:-none}" >> "$GITHUB_OUTPUT"

          [ -n "$CATALOG" ] && echo "Changed catalog skills: $CATALOG" || echo "No catalog skills changed"
          [ -n "$DEV" ] && echo "Changed dev skills: $DEV" || echo "No dev skills changed"

      - name: Scan catalog skills
        id: scan-catalog
        continue-on-error: true
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          steps.changes.outputs.catalog != 'none'
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: gpt-5.4-2026-03-05
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          # Verbose is always enabled
          SCAN_ARCHIVE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.archive == true) }}
          CHANGED_SKILLS: ${{ steps.changes.outputs.catalog }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VERBOSE_FLAGS="--verbose"

          # Always output detailed markdown report to stdout (visible in Actions log)
          REPORT_FLAGS="--format markdown --detailed"
          if [ "$SCAN_ARCHIVE" = "true" ]; then
            REPORT_DATE="$(printf '%05d' $(($(date +%Y) + 10000)))-$(date +%m)"
            # When archiving, redirect markdown to file instead of stdout
            REPORT_FLAGS="--format markdown --output docs/security-reports/${REPORT_DATE}-catalog.md --detailed"
          fi

          COMMON_FLAGS="--policy skill-scanner-policy.yaml --use-behavioral \
            --use-trigger --use-virustotal --vt-upload-files --lenient --fail-on-severity high"

          # LLM and Meta analyzers: skip on push (squash-merged PRs already passed full scan)
          if [ "$EVENT_NAME" != "push" ]; then
            COMMON_FLAGS="$COMMON_FLAGS --use-llm --llm-provider openai --enable-meta"
          fi

          # Full scan: manual dispatch, schedule, or edge-case fallback
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$CHANGED_SKILLS" = "all" ]; then
            echo "Running full catalog scan..."
            skill-scanner scan-all catalog/skills \
              $VERBOSE_FLAGS $REPORT_FLAGS $COMMON_FLAGS \
              --recursive --check-overlap
            exit $?
          fi

          # Incremental scan: only changed skill directories
          echo "Running incremental catalog scan..."
          failed=0
          for skill_name in $CHANGED_SKILLS; do
            skill_dir="catalog/skills/$skill_name"
            if [ -d "$skill_dir" ]; then
              echo "::group::Scanning $skill_dir"
              skill-scanner scan "$skill_dir" \
                --format markdown --format sarif \
                --output-sarif "/tmp/catalog-${skill_name}.sarif" \
                --detailed \
                $VERBOSE_FLAGS $COMMON_FLAGS || failed=1
              echo "::endgroup::"
            else
              echo "::warning::Skill directory $skill_dir no longer exists (deleted?), skipping"
            fi
          done

          # Merge individual SARIF files into one
          if ls /tmp/catalog-*.sarif 1>/dev/null 2>&1; then
            jq -s '. as $all | $all[0].runs[0] as $base | {
              "$schema": $all[0]["$schema"],
              version: $all[0].version,
              runs: [$base + {
                tool: ($base.tool | .driver.rules = ([$all[].runs[0].tool.driver.rules[]?] | unique_by(.id))),
                results: [$all[].runs[0].results[]?]
              }]
            }' /tmp/catalog-*.sarif > catalog-results.sarif
          fi

          [ "$failed" = "1" ] && exit 1
          exit 0

      - name: Scan dev tooling skills
        id: scan-dev
        continue-on-error: true
        if: >-
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          steps.changes.outputs.dev != 'none'
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: gpt-5.4-2026-03-05
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          # Verbose is always enabled
          SCAN_ARCHIVE: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.archive == true) }}
          CHANGED_SKILLS: ${{ steps.changes.outputs.dev }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VERBOSE_FLAGS="--verbose"

          # Always output detailed markdown report to stdout (visible in Actions log)
          REPORT_FLAGS="--format markdown --detailed"
          if [ "$SCAN_ARCHIVE" = "true" ]; then
            REPORT_DATE="$(printf '%05d' $(($(date +%Y) + 10000)))-$(date +%m)"
            # When archiving, redirect markdown to file instead of stdout
            REPORT_FLAGS="--format markdown --output docs/security-reports/${REPORT_DATE}-dev.md --detailed"
          fi

          COMMON_FLAGS="--policy skill-scanner-policy.yaml --use-behavioral \
            --use-trigger --use-virustotal --vt-upload-files --lenient --fail-on-severity high"

          # LLM and Meta analyzers: skip on push (squash-merged PRs already passed full scan)
          if [ "$EVENT_NAME" != "push" ]; then
            COMMON_FLAGS="$COMMON_FLAGS --use-llm --llm-provider openai --enable-meta"
          fi

          # Full scan: manual dispatch, schedule, or edge-case fallback
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$EVENT_NAME" = "schedule" ] || [ "$CHANGED_SKILLS" = "all" ]; then
            echo "Running full dev tooling scan..."
            skill-scanner scan-all .agents/skills \
              $VERBOSE_FLAGS $REPORT_FLAGS $COMMON_FLAGS \
              --recursive --check-overlap
            exit $?
          fi

          # Incremental scan: only changed skill directories
          echo "Running incremental dev tooling scan..."
          failed=0
          for skill_name in $CHANGED_SKILLS; do
            skill_dir=".agents/skills/$skill_name"
            if [ -d "$skill_dir" ]; then
              echo "::group::Scanning $skill_dir"
              skill-scanner scan "$skill_dir" \
                --format markdown --format sarif \
                --output-sarif "/tmp/dev-${skill_name}.sarif" \
                --detailed \
                $VERBOSE_FLAGS $COMMON_FLAGS || failed=1
              echo "::endgroup::"
            else
              echo "::warning::Skill directory $skill_dir no longer exists (deleted?), skipping"
            fi
          done

          # Merge individual SARIF files into one
          if ls /tmp/dev-*.sarif 1>/dev/null 2>&1; then
            jq -s '. as $all | $all[0].runs[0] as $base | {
              "$schema": $all[0]["$schema"],
              version: $all[0].version,
              runs: [$base + {
                tool: ($base.tool | .driver.rules = ([$all[].runs[0].tool.driver.rules[]?] | unique_by(.id))),
                results: [$all[].runs[0].results[]?]
              }]
            }' /tmp/dev-*.sarif > dev-results.sarif
          fi

          [ "$failed" = "1" ] && exit 1
          exit 0

      - name: Upload SARIF (catalog)
        if: always() && hashFiles('catalog-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: catalog-results.sarif
          category: skill-scanner-catalog

      - name: Upload SARIF (dev tooling)
        if: always() && hashFiles('dev-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4.32.6
        with:
          sarif_file: dev-results.sarif
          category: skill-scanner-dev

      - name: Archive scan reports
        if: >-
          always() &&
          (github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && inputs.archive == true))
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPORT_DATE="$(printf '%05d' $(($(date +%Y) + 10000)))-$(date +%m)"
          CATALOG_REPORT="docs/security-reports/${REPORT_DATE}-catalog.md"
          DEV_REPORT="docs/security-reports/${REPORT_DATE}-dev.md"

          # Check if any reports were generated
          if [ ! -f "$CATALOG_REPORT" ] && [ ! -f "$DEV_REPORT" ]; then
            echo "No reports to archive"
            exit 0
          fi

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          BRANCH="docs/security-report-${REPORT_DATE}"
          git checkout -b "$BRANCH"
          git add docs/security-reports/
          git commit -m "docs(security): archive ${REPORT_DATE} skill security scan report"
          git push origin "$BRANCH"

          # Build PR body
          cat > /tmp/pr-body.md << EOF
          ## Monthly Security Scan Report

          Automated full scan report for **${REPORT_DATE}**.

          Generated by the scheduled skill-scanner workflow with all analyzers enabled (strict policy).

          ### Reports
          EOF

          # Trim leading whitespace from heredoc
          sed -i 's/^          //' /tmp/pr-body.md

          [ -f "$CATALOG_REPORT" ] && echo "- \`${CATALOG_REPORT}\` -- Catalog skills scan" >> /tmp/pr-body.md
          [ -f "$DEV_REPORT" ] && echo "- \`${DEV_REPORT}\` -- Dev tooling skills scan" >> /tmp/pr-body.md

          # Create PR
          gh pr create \
            --title "docs(security): ${REPORT_DATE} skill security scan report" \
            --body-file /tmp/pr-body.md \
            --base main

      - name: Check scan results
        if: always()
        run: |
          failed=0
          if [ "${{ steps.scan-catalog.outcome }}" = "failure" ]; then
            echo "::error::Catalog skills: security findings at or above HIGH severity"
            failed=1
          fi
          if [ "${{ steps.scan-dev.outcome }}" = "failure" ]; then
            echo "::error::Dev tooling skills: security findings at or above HIGH severity"
            failed=1
          fi
          if [ "$failed" = "1" ]; then
            exit 1
          fi
          echo "All skill security scans passed"
