name: Skill Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'catalog/skills/**'
      - '.agents/skills/**'
  pull_request:
    paths:
      - 'catalog/skills/**'
      - '.agents/skills/**'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Enable verbose output (policy fingerprints, co-occurrence metadata, meta-analyzer false positives, and summary in log)'
        type: boolean
        default: false

permissions:
  security-events: write
  contents: read

jobs:
  scan:
    name: Skill Scanner
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed for incremental diff on push/PR
          fetch-depth: ${{ github.event_name == 'workflow_dispatch' && 1 || 0 }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install skill-scanner
        run: pip install cisco-ai-skill-scanner

      - name: Detect changed skills
        id: changes
        if: github.event_name != 'workflow_dispatch'
        run: |
          # Determine base SHA for diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          # Handle edge cases: force push, initial push, invalid SHA
          if [ -z "$BASE_SHA" ] || \
             [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || \
             ! git cat-file -t "$BASE_SHA" >/dev/null 2>&1; then
            echo "::warning::Cannot determine base SHA — falling back to full scan"
            echo "catalog=all" >> "$GITHUB_OUTPUT"
            echo "dev=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect changed catalog skill directories
          CATALOG=$(git diff --name-only "$BASE_SHA"..HEAD -- catalog/skills/ 2>/dev/null | \
            sed -n 's|^catalog/skills/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ' | xargs)

          # Detect changed dev tooling skill directories
          DEV=$(git diff --name-only "$BASE_SHA"..HEAD -- .agents/skills/ 2>/dev/null | \
            sed -n 's|^\.agents/skills/\([^/]*\)/.*|\1|p' | sort -u | tr '\n' ' ' | xargs)

          echo "catalog=${CATALOG:-none}" >> "$GITHUB_OUTPUT"
          echo "dev=${DEV:-none}" >> "$GITHUB_OUTPUT"

          [ -n "$CATALOG" ] && echo "Changed catalog skills: $CATALOG" || echo "No catalog skills changed"
          [ -n "$DEV" ] && echo "Changed dev skills: $DEV" || echo "No dev skills changed"

      - name: Scan catalog skills
        id: scan-catalog
        continue-on-error: true
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.catalog != 'none'
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: gpt-5.2-2025-12-11
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          SCAN_VERBOSE: ${{ inputs.verbose }}
          CHANGED_SKILLS: ${{ steps.changes.outputs.catalog }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VERBOSE_FLAGS=""
          if [ "$SCAN_VERBOSE" = "true" ]; then
            VERBOSE_FLAGS="--verbose --format summary"
          fi

          COMMON_FLAGS="--policy strict --use-behavioral --use-llm --llm-provider openai \
            --use-trigger --use-virustotal --enable-meta --lenient --fail-on-severity high"

          # Full scan: manual dispatch or edge-case fallback
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$CHANGED_SKILLS" = "all" ]; then
            echo "Running full catalog scan..."
            skill-scanner scan-all catalog/skills \
              $VERBOSE_FLAGS $COMMON_FLAGS \
              --format sarif --output catalog-results.sarif \
              --recursive --check-overlap
            exit $?
          fi

          # Incremental scan: only changed skill directories
          echo "Running incremental catalog scan..."
          failed=0
          for skill_name in $CHANGED_SKILLS; do
            skill_dir="catalog/skills/$skill_name"
            if [ -d "$skill_dir" ]; then
              echo "::group::Scanning $skill_dir"
              skill-scanner scan "$skill_dir" \
                $VERBOSE_FLAGS $COMMON_FLAGS \
                --format sarif --output "/tmp/catalog-${skill_name}.sarif" || failed=1
              echo "::endgroup::"
            else
              echo "::warning::Skill directory $skill_dir no longer exists (deleted?), skipping"
            fi
          done

          # Merge individual SARIF files into one
          if ls /tmp/catalog-*.sarif 1>/dev/null 2>&1; then
            jq -s '{
              "$schema": .[0]["$schema"],
              version: .[0].version,
              runs: [.[].runs[]]
            }' /tmp/catalog-*.sarif > catalog-results.sarif
          fi

          [ "$failed" = "1" ] && exit 1
          exit 0

      - name: Scan dev tooling skills
        id: scan-dev
        continue-on-error: true
        if: >-
          github.event_name == 'workflow_dispatch' ||
          steps.changes.outputs.dev != 'none'
        env:
          SKILL_SCANNER_LLM_API_KEY: ${{ secrets.SKILL_SCANNER_LLM_API_KEY }}
          SKILL_SCANNER_LLM_MODEL: gpt-5.2-2025-12-11
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
          SCAN_VERBOSE: ${{ inputs.verbose }}
          CHANGED_SKILLS: ${{ steps.changes.outputs.dev }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          VERBOSE_FLAGS=""
          if [ "$SCAN_VERBOSE" = "true" ]; then
            VERBOSE_FLAGS="--verbose --format summary"
          fi

          COMMON_FLAGS="--policy strict --use-behavioral --use-llm --llm-provider openai \
            --use-trigger --use-virustotal --enable-meta --lenient --fail-on-severity high"

          # Full scan: manual dispatch or edge-case fallback
          if [ "$EVENT_NAME" = "workflow_dispatch" ] || [ "$CHANGED_SKILLS" = "all" ]; then
            echo "Running full dev tooling scan..."
            skill-scanner scan-all .agents/skills \
              $VERBOSE_FLAGS $COMMON_FLAGS \
              --format sarif --output dev-results.sarif \
              --recursive --check-overlap
            exit $?
          fi

          # Incremental scan: only changed skill directories
          echo "Running incremental dev tooling scan..."
          failed=0
          for skill_name in $CHANGED_SKILLS; do
            skill_dir=".agents/skills/$skill_name"
            if [ -d "$skill_dir" ]; then
              echo "::group::Scanning $skill_dir"
              skill-scanner scan "$skill_dir" \
                $VERBOSE_FLAGS $COMMON_FLAGS \
                --format sarif --output "/tmp/dev-${skill_name}.sarif" || failed=1
              echo "::endgroup::"
            else
              echo "::warning::Skill directory $skill_dir no longer exists (deleted?), skipping"
            fi
          done

          # Merge individual SARIF files into one
          if ls /tmp/dev-*.sarif 1>/dev/null 2>&1; then
            jq -s '{
              "$schema": .[0]["$schema"],
              version: .[0].version,
              runs: [.[].runs[]]
            }' /tmp/dev-*.sarif > dev-results.sarif
          fi

          [ "$failed" = "1" ] && exit 1
          exit 0

      - name: Upload SARIF (catalog)
        if: always() && hashFiles('catalog-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: catalog-results.sarif
          category: skill-scanner-catalog

      - name: Upload SARIF (dev tooling)
        if: always() && hashFiles('dev-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: dev-results.sarif
          category: skill-scanner-dev

      - name: Check scan results
        if: always()
        run: |
          failed=0
          if [ "${{ steps.scan-catalog.outcome }}" = "failure" ]; then
            echo "::error::Catalog skills: security findings at or above HIGH severity"
            failed=1
          fi
          if [ "${{ steps.scan-dev.outcome }}" = "failure" ]; then
            echo "::error::Dev tooling skills: security findings at or above HIGH severity"
            failed=1
          fi
          if [ "$failed" = "1" ]; then
            exit 1
          fi
          echo "All skill security scans passed"
