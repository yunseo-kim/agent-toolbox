name: Upstream Skill Sync (Notify)

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Check specific repo only (e.g., openclaw/openclaw)'
        required: false
        type: string

# Prevent concurrent runs
concurrency:
  group: upstream-sync-notify
  cancel-in-progress: false

permissions:
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run upstream sync (notify mode)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/upstream-sync/sync.py \
            --mode=notify \
            ${{ inputs.repo && format('--repo {0}', inputs.repo) || '' }}
