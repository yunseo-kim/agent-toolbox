name: Upstream Skill Sync

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Sync specific repo only (e.g., openclaw/openclaw)'
        required: false
        type: string
      dry_run:
        description: 'Dry run -- print changes without creating PRs'
        type: boolean
        default: false
      init:
        description: 'Initialize SHA cache without creating PRs'
        type: boolean
        default: false

# Prevent concurrent runs
concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run upstream sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/upstream-sync/sync.py \
            ${{ inputs.init && '--init' || '' }} \
            ${{ inputs.dry_run && '--dry-run' || '' }} \
            ${{ inputs.repo && format('--repo {0}', inputs.repo) || '' }}
