name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

      - name: Validate catalog
        run: bun run validate

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build catalog index
        run: bun run build:index

      - name: Build all targets
        run: bun run build:all

      - name: Verify build outputs
        run: |
          if [ ! -d "dist/targets" ]; then
            echo "ERROR: dist/targets directory not found"
            exit 1
          fi
          
          target_count=$(find dist/targets -maxdepth 1 -type d | wc -l)
          # wc -l counts the parent dir too, so we expect 6 (parent + 5 targets)
          if [ "$target_count" -lt 6 ]; then
            echo "ERROR: Expected at least 5 target subdirectories in dist/targets, found $((target_count - 1))"
            exit 1
          fi
          
          echo "✓ Build outputs verified: dist/targets contains target subdirectories"

  drift-check:
    name: Catalog Index Drift Detection
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check for drift
        run: |
          # Save committed version (strip volatile generatedAt timestamp)
          jq 'del(.generatedAt)' catalog/metadata/catalog-index.json > /tmp/committed.json
          # Rebuild the index
          bun run build:index
          # Save rebuilt version (strip volatile generatedAt timestamp)
          jq 'del(.generatedAt)' catalog/metadata/catalog-index.json > /tmp/rebuilt.json
          # Compare content only (ignoring timestamp)
          if ! diff --unified /tmp/committed.json /tmp/rebuilt.json; then
            echo "::error::catalog-index.json is out of date. Run 'bun run build:index' and commit."
            exit 1
          fi
