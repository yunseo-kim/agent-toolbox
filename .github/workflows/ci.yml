name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Catalog
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run typecheck
        run: bun run typecheck

      - name: Validate catalog
        run: bun run validate

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: ESLint
        run: bun run lint

      - name: Prettier
        run: bun run format:check

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: [validate, lint]

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  build:
    name: Build All Targets
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build catalog index
        run: bun run build:index

      - name: Build all targets
        run: bun run build:all

      - name: Verify build outputs
        run: |
          if [ ! -d "dist/targets" ]; then
            echo "ERROR: dist/targets directory not found"
            exit 1
          fi

          target_count=$(find dist/targets -maxdepth 1 -type d | wc -l)
          # wc -l counts the parent dir too, so we expect 6 (parent + 5 targets)
          if [ "$target_count" -lt 6 ]; then
            echo "ERROR: Expected at least 5 target subdirectories in dist/targets, found $((target_count - 1))"
            exit 1
          fi

          echo "✓ Build outputs verified: dist/targets contains target subdirectories"

  build-cli:
    name: Build CLI (Node.js + Bun)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install

      - name: Build CLI
        run: bun run build:cli

      - name: Verify CLI build outputs
        run: |
          test -f dist/cli/launcher.js || { echo 'ERROR: dist/cli/launcher.js not found'; exit 1; }
          test -f dist/cli/main.js || { echo 'ERROR: dist/cli/main.js not found'; exit 1; }
          head -1 dist/cli/launcher.js | grep -q '#!/usr/bin/env node' || { echo 'ERROR: launcher.js missing shebang'; exit 1; }
          echo '✓ CLI build outputs verified'

      - name: Smoke test (Node.js)
        run: node dist/cli/launcher.js --help

      - name: Smoke test (Bun)
        run: bun dist/cli/main.js --help

  drift-check:
    name: Catalog Index Drift Detection
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Check for drift
        run: |
          # Save committed version (strip volatile generatedAt timestamp)
          jq 'del(.generatedAt)' catalog/metadata/skill-index.json > /tmp/committed.json
          # Rebuild the index
          bun run build:index
          # Save rebuilt version (strip volatile generatedAt timestamp)
          jq 'del(.generatedAt)' catalog/metadata/skill-index.json > /tmp/rebuilt.json
          # Compare content only (ignoring timestamp)
          if ! diff --unified /tmp/committed.json /tmp/rebuilt.json; then
            echo "::error::skill-index.json is out of date. Run 'bun run build:index' and commit."
            exit 1
          fi
